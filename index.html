<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>桥梁数字孪生实时监测系统</title>
    <!-- 引入 3D 模型组件 -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #00050a; color: #fff; font-family: "Microsoft YaHei", sans-serif; overflow: hidden; }

        /* 背景全屏 3D 视图 */
        model-viewer { width: 100vw; height: 100vh; background: radial-gradient(#001f3f, #00050a); }

        /* 左侧科技感面板 */
        .dashboard {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(0, 20, 40, 0.85); border: 2px solid #00d2ff;
            padding: 20px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,210,255,0.4);
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0 0 20px 0; font-size: 20px; color: #00d2ff; text-align: center; letter-spacing: 2px; border-bottom: 2px solid #00d2ff; padding-bottom: 10px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .data-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; border-left: 3px solid #00ffcc; }
        .label { font-size: 12px; color: #8bc3ff; display: block; margin-bottom: 5px; }
        .value { font-size: 18px; font-weight: bold; color: #00ffcc; }
        .unit { font-size: 10px; color: #666; margin-left: 4px; }

        /* 底部状态 */
        .status-bar { margin-top: 20px; font-size: 12px; color: #556; border-top: 1px solid #223; padding-top: 10px; }
        .online-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #0f0; }
        
        /* 💡 修改：3D热点标签的基础样式 (加入过渡动画) */
        .sensor-tag {
            background: rgba(0, 100, 0, 0.8); /* 默认绿色背景 */
            color: #ffffff;
            border: 2px solid #00ff00; /* 默认绿色边框 */
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
            white-space: nowrap;
            transition: all 0.5s ease-in-out; /* 颜色渐变动画 */
        }
    </style>
</head>
<body>

    <!-- 💡 注意：这里加入了 id="bridge-model"，JS才能找到它修改颜色 -->
    <model-viewer 
        id="bridge-model" 
        src="https://ylz1024.github.io/bridge-show/bridge.glb" 
        camera-controls 
        shadow-intensity="1" 
        exposure="1"
        camera-orbit="45deg 75deg 10m">

        <!-- 热点1：梁端姿态 -->
        <div id="tag-pose" class="sensor-tag" slot="hotspot-1" data-position="0m 0m 45m" data-normal="0m 1m 0m">
            梁端姿态: Pitch --
        </div>

        <!-- 热点2：跨中监测 -->
        <div id="tag-mid" class="sensor-tag" slot="hotspot-2" data-position="60m 0m 39m" data-normal="0m 1m 0m">
            跨中监测: Dist --
        </div>

        <!-- 热点3：支座监测 -->
        <div id="tag-support" class="sensor-tag" slot="hotspot-3" data-position="0m 0m 25.7m" data-normal="0m 1m 0m">
            支座监测: Weig --
        </div>
     
    </model-viewer>

    <!-- 实时看板 UI -->
    <div class="dashboard">
        <h1>桥梁实时数据看板</h1>

        <div class="data-grid">
            <div class="data-card"><span class="label">主梁位移</span><span id="distance" class="value">--</span><span class="unit">mm</span></div>
            <div class="data-card"><span class="label">环境温度</span><span id="temp" class="value">--</span><span class="unit">℃</span></div>
            <div class="data-card"><span class="label">结构温度</span><span id="struct_temp" class="value">--</span><span class="unit">℃</span></div>
            <div class="data-card"><span class="label">重量</span><span id="weight" class="value">--</span><span class="unit">g</span></div>
            <div class="data-card"><span class="label">倾角 Pitch</span><span id="pitch" class="value">--</span><span class="unit">°</span></div>
            <div class="data-card"><span class="label">湿度</span><span id="humi" class="value">--</span><span class="unit">%</span></div>
            <div class="data-card"><span class="label">气压</span><span id="pressure" class="value">--</span><span class="unit">hPa</span></div>
            <div class="data-card"><span class="label">桥梁评分 BCI</span><span id="score" class="value">--</span><span class="unit">分</span></div>
            <div class="data-card"><span class="label">桥梁等级</span><span id="class" class="value">--</span><span class="unit">类</span></div>
        </div>

        <div class="status-bar">
            <span class="online-dot"></span> 设备状态: ESP8266 在线<br>
            更新时间: <span id="update-time">等待获取...</span>
        </div>
    </div>

<script>
    // 配置信息
    const PRODUCT_ID = 'e39XlYUdcE';
    const DEVICE_NAME = 'ESP8266';
    const TOKEN = 'version=2018-10-31&res=products%2Fe39XlYUdcE%2Fdevices%2FESP8266&et=1798704328&method=md5&sign=1Rq3Du1iHq7NrHnxUIlGcQ%3D%3D';

    // 💡 调试工具：模型加载完成后，打印出材质名称帮你找对名字
    window.onload = function() {
        const viewer = document.getElementById('bridge-model');
        if(viewer) {
            viewer.addEventListener('load', () => {
                console.log("✅ 3D模型加载成功！包含以下材质：");
                const materials = viewer.model.materials;
                for (let i = 0; i < materials.length; i++) {
                    console.log(`▶️ 材质[${i}] 的名字是: "${materials[i].name}"`);
                }
                console.log("💡 注意：如果模型不变色，请把上方找到的名字，填到代码的 NAME_OF_DECK 和 NAME_OF_SUPPORT 中！");
            });
        }
    };

    // 防崩溃文本更新函数
    function safeUpdateText(elementId, text) {
        const el = document.getElementById(elementId);
        if (el) el.textContent = text;
    }

    // 防崩溃标签颜色应用函数
    function applyColor(elementId, colorObj) {
        const el = document.getElementById(elementId);
        if (!el) return; 
        el.style.backgroundColor = colorObj.bg;
        el.style.borderColor = colorObj.border;
        el.style.boxShadow = `0 0 15px ${colorObj.shadow}`;
    }

    // 💡 3D 模型材质变色器
    function set3DModelColor(materialNameExact, colorRGBA) {
        const modelViewer = document.getElementById("bridge-model");
        if (!modelViewer || !modelViewer.model || !modelViewer.model.materials) return;

        const materials = modelViewer.model.materials;
        for (let i = 0; i < materials.length; i++) {
            // 使用 includes 进行模糊匹配，忽略大小写
            if (materials[i].name.toLowerCase().includes(materialNameExact.toLowerCase())) {
                materials[i].pbrMetallicRoughness.setBaseColorFactor(colorRGBA);
            }
        }
    }

    // 🟢🟡🔴 核心功能：标签与 3D 模型双轨联动
    function updateTwinColors(disease, sensor, target, level) {
        // --- 1. 标签的颜色定义 (CSS RGBA) ---
        const TAG_GREEN  = { bg: 'rgba(0, 100, 0, 0.8)', border: '#00ff00', shadow: 'rgba(0,255,0,0.5)' };
        const TAG_YELLOW = { bg: 'rgba(200, 150, 0, 0.8)', border: '#ffcc00', shadow: 'rgba(255,200,0,0.5)' };
        const TAG_RED    = { bg: 'rgba(200, 0, 0, 0.8)', border: '#ff0000', shadow: 'rgba(255,0,0,0.5)' };

        // --- 2. 3D模型的颜色定义 (WebGL RGBA格式，范围 0.0~1.0) ---
        const MODEL_DECK_NORMAL    = [0.45, 0.38, 0.30, 1.0]; // 棕褐色桥面 (正常)
        const MODEL_SUPPORT_NORMAL = [0.25, 0.27, 0.28, 1.0]; // 深灰色支座 (正常)
        const MODEL_YELLOW         = [1.0,  0.8,  0.0,  1.0]; // 预警黄
        const MODEL_RED            = [1.0,  0.1,  0.1,  1.0]; // 危险红

        // 🔥🔥🔥 【极其重要】：如果在 F12 发现材质名不对，请修改下面这两个词！ 🔥🔥🔥
        const NAME_OF_DECK = "混凝土";       // 匹配 "混凝土, 现场浇注灰色" (这应该是你的桥面)
        const NAME_OF_SUPPORT = "Material";  // 匹配 "Material" (这大概率是你的支座，如果不对换成 "default" 试试)

        // 每次刷新先复原所有状态
        applyColor("tag-pose", TAG_GREEN);
        applyColor("tag-mid", TAG_GREEN);
        applyColor("tag-support", TAG_GREEN);
        set3DModelColor(NAME_OF_DECK, MODEL_DECK_NORMAL);    
        set3DModelColor(NAME_OF_SUPPORT, MODEL_SUPPORT_NORMAL); 

        // 如果完全健康，直接返回
        if (disease === 0 && level <= 1) return;

        // 确定当前报警颜色
        let alertTagColor = (level >= 3) ? TAG_RED : TAG_YELLOW;
        let alertModelColor = (level >= 3) ? MODEL_RED : MODEL_YELLOW;

        // --- 3. 解析 STM32 下发的诊断逻辑执行变色 ---
        if (disease === 1) { 
            // 逻辑 A: 传感器异常 (只有标签变色，3D模型不变色)
            if (sensor === 1) applyColor("tag-mid", alertTagColor);      
            if (sensor === 2) applyColor("tag-pose", alertTagColor);     
            if (sensor === 3) applyColor("tag-support", alertTagColor);  
        } 
        else if (disease === 2 || target === 2) { 
            // 逻辑 B: 桥面超载/下挠 (跨中标签变色 + 桥面3D模型变色)
            applyColor("tag-mid", alertTagColor); 
            set3DModelColor(NAME_OF_DECK, alertModelColor); 
        }
        else if (disease === 3 || target === 3) { 
            // 逻辑 C: 支座脱空/受损 (支座标签变色 + 支座3D模型变色)
            applyColor("tag-support", alertTagColor); 
            set3DModelColor(NAME_OF_SUPPORT, alertModelColor); 
        }
    }

    async function fetchOneNETData() {
        const url = `https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}`;
        try {
            const response = await fetch(url, { method: 'GET', headers: { 'authorization': TOKEN } });
            const json = await response.json();

            if (json.code === 0 && json.data) {
                // 存储数值
                let displacement = NaN, pitchValue = NaN, weightValue = NaN;
                let disease = 0, sensor = 0, target = 0, level = 0;

                json.data.forEach(item => {
                    const el = document.getElementById(item.identifier);
                    if (el) {
                        const val = typeof item.value === 'number' ? item.value.toFixed(1) : item.value;
                        el.innerText = val;
                    }

                    if (item.identifier === "distance") displacement = Number(item.value);
                    if (item.identifier === "pitch") pitchValue = Number(item.value);
                    if (item.identifier === "weight") weightValue = Number(item.value);

                    if (item.identifier === "disease") disease = Number(item.value);
                    if (item.identifier === "sensor") sensor = Number(item.value);
                    if (item.identifier === "target") target = Number(item.value);
                    if (item.identifier === "level") level = Number(item.value);
                });

                // 打印诊断信息调试
                console.log(`📡 收到数据 -> 病害:${disease}, 目标:${target}, 等级:${level}`);

                // 更新 3D 热点数值文字
                if (!isNaN(pitchValue))   safeUpdateText("tag-pose", `梁端姿态: Pitch ${pitchValue.toFixed(1)}°`);
                if (!isNaN(displacement)) safeUpdateText("tag-mid", `跨中监测: Dist ${displacement.toFixed(1)} mm`);
                if (!isNaN(weightValue))  safeUpdateText("tag-support", `支座监测: Weig ${weightValue.toFixed(1)} g`);

                // 🟢🟡🔴 触发双轨变色联动
                updateTwinColors(disease, sensor, target, level);

                // 更新时间戳
                const timeEl = document.getElementById('update-time');
                if (timeEl) timeEl.innerText = new Date().toLocaleTimeString();
            }
        } catch (err) {
            console.error("网络请求失败", err);
        }
    }

    // 每 2 秒拉取一次最新数据
    setInterval(fetchOneNETData, 2000);
    fetchOneNETData();
</script>
</body>
</html>
