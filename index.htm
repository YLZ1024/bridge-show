<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桥梁模型展示</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background: #111;
    }
  </style>
</head>
<body>
  <model-viewer
    src="bridge.glb"
    alt="桥梁三维模型"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    ar>
  </model-viewer>
</body>
</html>
